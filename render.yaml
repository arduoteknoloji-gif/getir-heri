services:
  - type: web
    name: getir-heri-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: getir-db
      - key: JWT_SECRET
        sync: false
      - key: ENV
        value: production
    healthCheckPath: /api/health
